<app-header></app-header>

<div class="main-container">
  <app-sidebar></app-sidebar>
  <div class="form-list-panel">
    <h2><b>Edição de Medicamento</b></h2>

    <form class="form-grid" #form="ngForm" (ngSubmit)="editar()">
      <div class="form-buttons">
        <a routerLink="/medicamento/listagem" class="btn">Listar</a>
      </div>

      <div class="campo grande">
        <label>Nome do medicamento *</label>
        <input
          type="text"
          name="nome"
          placeholder="Digite o nome do medicamento"
          required
          [(ngModel)]="medicamento.nome"
        />
      </div>

      <div class="campo">
        <label>Categoria *</label>
        <select name="categoria" required [(ngModel)]="medicamento.categoria">
          <option value="">Selecione</option>
          <option value="Analgésico">Analgésico</option>
          <option value="Anti-inflamatório">Anti-inflamatório</option>
          <option value="Antibiótico">Antibiótico</option>
          <option value="Antialérgico">Antialérgico</option>
          <option value="Vitamina/Suplemento">Vitamina/Suplemento</option>
          <option value="Antidepressivo/Ansiolítico">Antidepressivo/Ansiolítico</option>
          <option value="Outro">Outro</option>
        </select>
      </div>

      <div class="campo">
        <label>Unidade de medida *</label>
        <select name="unidadeMedida" required [(ngModel)]="medicamento.unidadeMedida">
          <option value="">Selecione</option>
          <option value="Comprimido">Comprimido</option>
          <option value="Cápsula">Cápsula</option>
          <option value="Ampola">Ampola</option>
          <option value="Frasco">Frasco</option>
          <option value="Sachê">Sachê</option>
          <option value="Pomada/Creme">Pomada/Creme</option>
          <option value="Ml">Ml</option>
          <option value="Mg">Mg</option>
        </select>
      </div>

      <div class="form-buttons">
        <button type="submit" class="btn">Alterar</button>
        <a routerLink="/medicamento/listagem" class="btn-voltar"><< Voltar</a>
      </div>
    </form>
  </div>
</div>
