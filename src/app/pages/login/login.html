<div class="login-container">
  <div class="login-panel">

    <div class="form">
      <form>
        <label for="user">Usuário</label>
        <input type="email" id="user" name="user">

        <label for="password">Senha</label>

        <button type="submit">Entrar</button>
      </form>
    </div>
  </div>
</div>
